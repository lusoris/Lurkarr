version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - gocritic
    - gofmt
    - gosec
    - nilerr
  settings:
    gosec:
      excludes:
        - G104  # unhandled errors in deferred calls
        - G304  # file path provided as taint input
    gocritic:
      enabled-tags:
        - diagnostic
        - style
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
