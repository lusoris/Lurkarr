openapi: 3.1.0
info:
  title: Lurkarr API
  description: >-
    REST API for Lurkarr — an automated media management tool that integrates
    with Sonarr, Radarr, Lidarr, Readarr, Whisparr, Eros, Prowlarr, SABnzbd,
    and Seerr.
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: /
    description: Current server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Passkeys
    description: WebAuthn passkey management
  - name: Sessions
    description: Session management
  - name: User
    description: User profile management
  - name: Admin
    description: Admin user management
  - name: Instances
    description: App instance CRUD
  - name: Settings
    description: General and per-app settings
  - name: History
    description: Lurk history
  - name: Stats
    description: Lurk statistics and hourly caps
  - name: State
    description: Instance state tracking and reset
  - name: Schedules
    description: Task scheduling
  - name: Prowlarr
    description: Prowlarr integration
  - name: SABnzbd
    description: SABnzbd download client
  - name: Queue
    description: Queue cleaner, scoring, download clients
  - name: DownloadClients
    description: Download client instances
  - name: Blocklist
    description: Blocklist sources and rules
  - name: Notifications
    description: Notification providers
  - name: Seerr
    description: Seerr integration
  - name: Activity
    description: Activity feed
  - name: OIDC
    description: OpenID Connect settings
  - name: InstanceGroups
    description: Cross-instance group management
  - name: System
    description: Health and metrics

paths:
  # ── Auth ──────────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in
      description: Authenticate with username/password. Returns session cookie and CSRF token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
        '401':
          description: Invalid credentials or TOTP required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - $ref: '#/components/schemas/TOTPRequiredResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Log out
      description: Invalidate current session.
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'

  /api/auth/setup:
    get:
      operationId: setupCheck
      tags: [Auth]
      summary: Check if setup is needed
      description: Returns whether initial setup (first user creation) is required.
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup:
                    type: boolean

    post:
      operationId: setup
      tags: [Auth]
      summary: First-run setup
      description: Create initial admin user. Only works when no users exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/2fa/enable:
    post:
      operationId: enable2FA
      tags: [Auth]
      summary: Enable 2FA
      description: Generate TOTP secret, QR code, and recovery codes for the current user.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: TOTP secret generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enable2FAResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/2fa/disable:
    post:
      operationId: disable2FA
      tags: [Auth]
      summary: Disable 2FA
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/2fa/verify:
    post:
      operationId: verify2FA
      tags: [Auth]
      summary: Verify TOTP code
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Code verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: verified
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/2fa/recovery-codes:
    post:
      operationId: regenerateRecoveryCodes
      tags: [Auth]
      summary: Regenerate recovery codes
      description: Generate new recovery codes for 2FA. Requires 2FA to be enabled.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: New recovery codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/oidc/info:
    get:
      operationId: getOIDCInfo
      tags: [Auth]
      summary: Get OIDC status
      responses:
        '200':
          description: OIDC configuration status
          content:
            application/json:
              schema:
                type: object
                properties:
                  oidc_enabled:
                    type: boolean

  /api/auth/oidc/login:
    get:
      operationId: oidcLogin
      tags: [Auth]
      summary: Initiate OIDC login
      description: Redirects to the OIDC provider for authentication.
      responses:
        '302':
          description: Redirect to OIDC provider

  /api/auth/oidc/callback:
    get:
      operationId: oidcCallback
      tags: [Auth]
      summary: OIDC callback
      description: Handles the authorization code callback from the OIDC provider.
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to application after successful authentication

  /api/auth/passkey/info:
    get:
      operationId: getPasskeyInfo
      tags: [Passkeys]
      summary: Get passkey login availability
      description: Returns whether passkey login is available (any credentials registered).
      responses:
        '200':
          description: Passkey info
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkey_available:
                    type: boolean

  /api/auth/passkey/login/begin:
    post:
      operationId: beginPasskeyLogin
      tags: [Passkeys]
      summary: Begin passkey login
      description: Returns WebAuthn credential assertion options.
      responses:
        '200':
          description: WebAuthn assertion options
          content:
            application/json:
              schema:
                type: object
                description: WebAuthn CredentialAssertion options

  /api/auth/passkey/login/finish:
    post:
      operationId: finishPasskeyLogin
      tags: [Passkeys]
      summary: Finish passkey login
      description: Validates the WebAuthn assertion and creates a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn assertion response from browser
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Passkeys ──────────────────────────────────────────────────────────
  /api/passkeys:
    get:
      operationId: listPasskeys
      tags: [Passkeys]
      summary: List registered passkeys
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Registered passkeys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebAuthnCredential'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/passkeys/register/begin:
    post:
      operationId: beginPasskeyRegistration
      tags: [Passkeys]
      summary: Begin passkey registration
      description: Returns WebAuthn credential creation options.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: WebAuthn creation options
          content:
            application/json:
              schema:
                type: object
                description: WebAuthn CredentialCreation options
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/passkeys/register/finish:
    post:
      operationId: finishPasskeyRegistration
      tags: [Passkeys]
      summary: Finish passkey registration
      description: Validates the WebAuthn attestation and stores the credential.
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: query
          description: Optional friendly name for the passkey
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn attestation response from browser
      responses:
        '201':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/passkeys/{id}:
    delete:
      operationId: deletePasskey
      tags: [Passkeys]
      summary: Delete a passkey
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/passkeys/{id}/rename:
    post:
      operationId: renamePasskey
      tags: [Passkeys]
      summary: Rename a passkey
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Sessions ──────────────────────────────────────────────────────────
  /api/sessions:
    get:
      operationId: listSessions
      tags: [Sessions]
      summary: List active sessions
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      operationId: revokeAllSessions
      tags: [Sessions]
      summary: Revoke all other sessions
      description: Revokes all sessions except the current one.
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [Sessions]
      summary: Revoke a specific session
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── User ──────────────────────────────────────────────────────────────
  /api/user:
    get:
      operationId: getUser
      tags: [User]
      summary: Get current user profile
      security:
        - cookieAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user/username:
    post:
      operationId: updateUsername
      tags: [User]
      summary: Update username
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user/password:
    post:
      operationId: updatePassword
      tags: [User]
      summary: Update password
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Admin ─────────────────────────────────────────────────────────────
  /api/admin/users:
    get:
      operationId: listUsers
      tags: [Admin]
      summary: List all users
      security:
        - cookieAuth: []
      responses:
        '200':
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createUser
      tags: [Admin]
      summary: Create a new user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                is_admin:
                  type: boolean
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  is_admin:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/admin/users/{id}:
    delete:
      operationId: deleteUser
      tags: [Admin]
      summary: Delete a user
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/admin/users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [Admin]
      summary: Reset a user's password
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/admin/users/{id}/toggle-admin:
    post:
      operationId: toggleAdmin
      tags: [Admin]
      summary: Toggle admin status
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_admin]
              properties:
                is_admin:
                  type: boolean
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Instances ─────────────────────────────────────────────────────────
  /api/instances:
    get:
      operationId: listAllInstances
      tags: [Instances]
      summary: List all instances grouped by app type
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Instances grouped by app type (API keys masked)
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/AppInstance'

  /api/instances/{app}:
    get:
      operationId: listInstances
      tags: [Instances]
      summary: List instances for an app type
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AppTypePath'
      responses:
        '200':
          description: List of instances (API keys masked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppInstance'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      operationId: createInstance
      tags: [Instances]
      summary: Create a new instance
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AppTypePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceRequest'
      responses:
        '201':
          description: Instance created (API key masked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/instances/{id}:
    put:
      operationId: updateInstance
      tags: [Instances]
      summary: Update an instance
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstanceRequest'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteInstance
      tags: [Instances]
      summary: Delete an instance
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/instances/{id}/health:
    get:
      operationId: healthCheckInstance
      tags: [Instances]
      summary: Health check an instance
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          description: Instance health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, offline]
                  app:
                    type: string
                  version:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/instances/test:
    post:
      operationId: testInstanceConnection
      tags: [Instances]
      summary: Test connection to an arr instance
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestInstanceRequest'
      responses:
        '200':
          description: Connection successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestConnectionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: SSRF protection — private URL blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          $ref: '#/components/responses/BadGateway'

  # ── Settings ──────────────────────────────────────────────────────────
  /api/settings/general:
    get:
      operationId: getGeneralSettings
      tags: [Settings]
      summary: Get general settings
      description: Secret key is masked in the response.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: General settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'
    put:
      operationId: updateGeneralSettings
      tags: [Settings]
      summary: Update general settings
      description: Secret key is always preserved server-side and cannot be changed via API.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneralSettings'
      responses:
        '200':
          description: Updated settings (secret key masked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/settings/{app}:
    get:
      operationId: getAppSettings
      tags: [Settings]
      summary: Get per-app settings
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AppTypePath'
      responses:
        '200':
          description: App settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
        '400':
          $ref: '#/components/responses/BadRequest'

    put:
      operationId: updateAppSettings
      tags: [Settings]
      summary: Update per-app settings
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AppTypePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppSettings'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── History ───────────────────────────────────────────────────────────
  /api/history:
    get:
      operationId: listHistory
      tags: [History]
      summary: List lurk history
      security:
        - cookieAuth: []
      parameters:
        - name: app
          in: query
          schema:
            $ref: '#/components/schemas/AppType'
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /api/history/{app}:
    delete:
      operationId: deleteHistory
      tags: [History]
      summary: Delete history for an app type
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AppTypePath'
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Stats ─────────────────────────────────────────────────────────────
  /api/stats:
    get:
      operationId: getStats
      tags: [Stats]
      summary: Get lurk statistics
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Per-app, per-instance stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LurkStats'

  /api/stats/reset:
    post:
      operationId: resetStats
      tags: [Stats]
      summary: Reset all statistics
      security:
        - cookieAuth: []
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'

  /api/stats/hourly-caps:
    get:
      operationId: getHourlyCaps
      tags: [Stats]
      summary: Get hourly API cap usage
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Hourly cap entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HourlyCap'

  # ── State ─────────────────────────────────────────────────────────────
  /api/state:
    get:
      operationId: getState
      tags: [State]
