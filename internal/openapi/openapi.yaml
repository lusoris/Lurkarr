              type: object
              required: [external_id, title, instance_id, season_from]
              properties:
                external_id:
                  type: string
                title:
                  type: string
                instance_id:
                  type: string
                  format: uuid
                season_from:
                  type: integer
                season_to:
                  type: integer
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitSeasonRule'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/instance-groups/by-id/{id}/season-rules/{ruleId}:
    delete:
      operationId: deleteSeasonRule
      tags: [InstanceGroups]
      summary: Delete a split season rule
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/StatusOk'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/instance-groups/actions:
    get:
      operationId: listGroupActions
      tags: [InstanceGroups]
      summary: List cross-instance actions
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Cross-instance actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CrossInstanceAction'

  # ── System ────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: livenessProbe
      tags: [System]
      summary: Kubernetes liveness probe
      description: Always returns 200 if the process is running. No dependency checks.
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok

  /readyz:
    get:
      operationId: readinessProbe
      tags: [System]
      summary: Kubernetes readiness probe
      description: Returns 200 if the database is reachable. Returns 503 otherwise.
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /metrics:
    get:
      operationId: getMetrics
      tags: [System]
      summary: Prometheus metrics
      description: Prometheus exposition format. No auth required.
      responses:
        '200':
          description: Metrics
          content:
            text/plain:
              schema:
                type: string

# ═══════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lurkarr_session

  parameters:
    AppTypePath:
      name: app
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/AppType'

    UUIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    StatusOk:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                const: ok

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    BadGateway:
      description: Upstream service error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ── Enums ───────────────────────────────────────────────────────────
    AppType:
      type: string
      enum: [sonarr, radarr, lidarr, readarr, whisparr, eros, prowlarr]

    NotificationProviderType:
      type: string
      enum: [discord, telegram, pushover, gotify, ntfy, apprise, email, webhook]

    PatternType:
      type: string
      enum: [release_group, title_contains, title_regex, indexer, file_pattern]

    DownloadClientType:
      type: string
      enum: [qbittorrent, transmission, deluge, rtorrent, utorrent, sabnzbd, nzbget]

    # ── Error ───────────────────────────────────────────────────────────
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ErrorWithDetails:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: string

    # ── Auth ────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        totp_code:
          type: string
        recovery_code:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        csrf_token:
          type: string

    TOTPRequiredResponse:
      type: object
      properties:
        error:
          type: string
          const: totp_required
        totp_required:
          type: boolean
          const: true

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    Enable2FAResponse:
      type: object
      properties:
        secret:
          type: string
        qr_base64:
          type: string
        recovery_codes:
          type: array
          items:
            type: string

    # ── User ────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        auth_provider:
          type: string
        external_id:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserProfile:
