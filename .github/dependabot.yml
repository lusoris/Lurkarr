version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "deps(go):"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /frontend
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps(npm):"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker):"

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci):"
