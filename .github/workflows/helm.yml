name: Helm

on:
  push:
    branches: [develop]
  pull_request:
    paths:
      - "deploy/helm/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_NAME: lurkarr

jobs:
  lint-and-package:
    name: Lint, Package & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build dependencies
        run: helm dependency build deploy/helm/lurkarr

      - name: Lint chart
        run: helm lint deploy/helm/lurkarr

      - name: Package chart
        run: |
          COMMIT_SHA=${GITHUB_SHA::7}
          sed -i "s/^version:.*/version: 0.0.0-dev.${COMMIT_SHA}/" deploy/helm/lurkarr/Chart.yaml
          helm package deploy/helm/lurkarr -d .helm-packages

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR
        run: helm push .helm-packages/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-packages/*.tgz
