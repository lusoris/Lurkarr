name: Helm

on:
  push:
    branches: [develop]
  pull_request:
    paths:
      - "deploy/helm/**"

permissions:
  contents: read

jobs:
  lint-and-package:
    name: Lint & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/lurkarr

      - name: Package chart
        run: helm package deploy/helm/lurkarr -d .helm-packages

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-packages/*.tgz
